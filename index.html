<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Deploy Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: linear-gradient(135deg, #f5efe6, #dce8f2);
        --panel: rgba(255, 255, 255, 0.82);
        --text: #1f2933;
        --accent: #0f766e;
        --border: rgba(15, 118, 110, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
      }

      main {
        width: min(680px, 100%);
        padding: 40px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.14);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.2rem, 4vw, 3.4rem);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.7;
      }

      strong {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HTML Deploy Demo</h1>
      <p>
        This repository now ships a minimal static page and can be published to
        <strong>GitHub Pages</strong> directly from the <strong>main</strong>
        branch through GitHub Actions.
      </p>
    </main>
  </body>
</html>
