name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare artifact
        run: |
          rm -rf ./_site
          mkdir -p ./_site
          mkdir -p ./_site/数字图书列表
          # Publish both paths so the root URL and the legacy subdirectory URL keep working.
          cp -R ./数字图书列表/. ./_site/
          cp -R ./数字图书列表/. ./_site/数字图书列表/
          cp ./index.html ./_site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
